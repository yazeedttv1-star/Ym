<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الـ X-O السحري 🎮</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e6f0fa 0%, #b3daf5 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .game-container {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(43, 123, 185, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: #2b7bb9;
            margin-bottom: 10px;
            font-size: 26px;
        }

        .status-text {
            font-size: 18px;
            color: #555;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* شبكة لعبة اكس او */
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .cell {
            background-color: #f0f7fc;
            border: 3px solid #2b7bb9;
            height: 90px;
            border-radius: 15px;
            font-size: 42px;
            font-weight: 900;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #1c5380;
        }

        .cell:hover {
            background-color: #e1f0fa;
            transform: scale(1.02);
        }

        .cell.x { color: #2b7bb9; }
        .cell.o { color: #ff4d6d; }

        .btn-reset {
            background-color: #2b7bb9;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-reset:hover {
            background-color: #1c5380;
        }

        /* شاشة التحكم والرسائل الطارئة لايف */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(43, 123, 185, 0.9);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.3s ease;
            text-align: center;
            padding: 20px;
        }

        .overlay-content {
            background: rgba(255, 255, 255, 0.15);
            padding: 35px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.2);
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="message-overlay" class="overlay hidden">
        <div class="overlay-content">
            <div style="font-size: 60px; margin-bottom: 15px; animation: float 1s infinite alternate;">💌✨</div>
            <h1 id="overlay-title" style="color: white; font-size: 30px; margin-bottom: 15px;">رسالة من المحكم!</h1>
            <p id="overlay-text" style="font-size: 18px; line-height: 1.6; font-weight: bold;"></p>
        </div>
    </div>

    <div class="game-container">
        <h1>تحدي الـ X-O السحري 🎮</h1>
        <div class="status-text" id="status">دور اللاعب: X</div>
        
        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <button class="btn-reset" id="reset-btn">إعادة اللعب 🔄</button>
    </div>

    <script>
        // --- إعدادات الفايربيس الخاصة بمشروعك ---
        const firebaseConfig = {
            databaseURL: "https://my-project-f00cd-default-rtdb.firebaseio.com/"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();

        // عناصر الصفحة
        const cells = document.querySelectorAll(".cell");
        const statusText = document.getElementById("status");
        const resetBtn = document.getElementById("reset-btn");
        const messageOverlay = document.getElementById("message-overlay");
        const overlayTitle = document.getElementById("overlay-title");
        const overlayText = document.getElementById("overlay-text");

        let boardState = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let isGameActive = true;

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // صفوف
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // أعمدة
            [0, 4, 8], [2, 4, 6]             // أقطار
        ];

        // الاستماع المباشر للفايربيس للتحكم باللعبة والرسائل
        database.ref('remoteControl').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // 1. التحكم في إظهار رسالة صلح منبثقة فوق اللعبة
                if (data.showAlert === true || data.showAlert === "true") {
                    if (data.alertTitle) overlayTitle.innerText = data.alertTitle;
                    if (data.alertText) overlayText.innerText = data.alertText;
                    messageOverlay.classList.remove("hidden");
                    // عمل تأثير احتفالي لو ظهرت الرسالة
                    confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                } else {
                    messageOverlay.classList.add("hidden");
                }

                // 2. التحكم في تصفير اللعبة عن بعد لو كتبت في الفايربيس حقل باسم resetGame وقيمته true
                if (data.resetGame === true || data.resetGame === "true") {
                    resetGame();
                    // رجعها لـ false تلقائياً في الفايربيس علشان متفضلش معلقة
                    database.ref('remoteControl').update({ resetGame: false });
                }
            }
        });

        // لقطات اللعب
        cells.forEach(cell => cell.addEventListener("click", handleCellClick));
        resetBtn.addEventListener("click", resetGame);

        function handleCellClick(e) {
            const clickedCell = e.target;
            const clickedCellIndex = parseInt(clickedCell.getAttribute("data-index"));

            if (boardState[clickedCellIndex] !== "" || !isGameActive) return;

            updateCell(clickedCell, clickedCellIndex);
            checkResult();
        }

        function updateCell(cell, index) {
            boardState[index] = currentPlayer;
            cell.innerText = currentPlayer;
            cell.classList.add(currentPlayer.toLowerCase());
        }

        function checkResult() {
            let roundWon = false;
            for (let i = 0; i < winningConditions.length; i++) {
                const winCondition = winningConditions[i];
                let a = boardState[winCondition[0]];
                let b = boardState[winCondition[1]];
                let c = boardState[winCondition[2]];
                if (a === "" || b === "" || c === "") continue;
                if (a === b && a === c) {
                    roundWon = true;
                    break;
                }
            }

            if (roundWon) {
                statusText.innerText = `مبروووك! الفائز هو الكابتن ${currentPlayer} 🎉`;
                statusText.style.color = "#4caf50";
                triggerWinCelebration();
                isGameActive = false;
                return;
            }

            let roundDraw = !boardState.includes("");
            if (roundDraw) {
                statusText.innerText = "تعادل! العبوا تاني 🤝";
                statusText.style.color = "#ff9800";
                isGameActive = false;
                return;
            }

            // تبديل الدور
            currentPlayer = currentPlayer === "X" ? "O" : "X";
            statusText.innerText = `دور اللاعب: ${currentPlayer}`;
        }

        function resetGame() {
            boardState = ["", "", "", "", "", "", "", "", ""];
            isGameActive = true;
            currentPlayer = "X";
            statusText.innerText = "دور اللاعب: X";
            statusText.style.color = "#555";
            cells.forEach(cell => {
                cell.innerText = "";
                cell.classList.remove("x", "o");
            });
        }

        function triggerWinCelebration() {
            var duration = 3 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }
    </script>
</body>
</html>

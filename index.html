<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>واتساب برو | المحادثة الفورية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">

    <div id="screen-auth" class="screen active auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fab fa-whatsapp whatsapp-icon"></i>
                <h2>واتساب ويب الموحد</h2>
                <p>سجل دخولك لبدء المحادثة الفورية المشفرة</p>
            </div>

            <div class="auth-section">
                <div class="input-field">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email-login" placeholder="البريد الإلكتروني...">
                </div>
                <div class="input-field">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password-login" placeholder="كلمة المرور...">
                </div>
                <button id="btn-email-auth" class="main-btn teal-btn">
                    <i class="fas fa-sign-in-alt"></i> تسجيل / دخول بالبريد
                </button>
            </div>

            <div class="text-divider">أو الدخول السريع بنقرة واحدة</div>

            <div class="social-auth-container">
                <button id="btn-google-login" class="social-btn google-btn">
                    <i class="fab fa-google"></i> حساب Google
                </button>
                <button id="btn-anon-login" class="social-btn anon-btn">
                    <i class="fas fa-user-secret"></i> دخول كمستحدم مجهول
                </button>
            </div>
        </div>
    </div>

    <div id="screen-app" class="screen chat-wrapper">
        <div class="app-header">
            <div class="user-profile">
                <div class="avatar-circle" id="user-avatar">U</div>
                <div class="profile-meta">
                    <h3 id="user-display-name">جاري التحميل...</h3>
                    <div class="uid-box">
                        <span>الـ ID القصير الخاص بك:</span>
                        <input type="text" id="user-uid-input" readonly title="اضغط لنسخ الـ ID">
                    </div>
                </div>
            </div>
            <button id="btn-logout" class="logout-btn" title="تسجيل الخروج"><i class="fas fa-sign-out-alt"></i></button>
        </div>

        <div class="connect-holder">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="target-identifier" placeholder="أدخل الـ ID المصغر لصديقك (6 رموز)...">
            </div>
            <button id="btn-connect-room" class="action-connect">ربط الشات</button>
        </div>

        <div class="chat-area" id="chat-messages">
            <div class="welcome-box">
                <i class="fas fa-lock"></i>
                <p>المحادثة آمنة تماماً. تبادل الـ ID المصغر الموجود في الأعلى مع صديقك وضعه في خانة البحث لفتح الروم وبدء المراسلة الحية.</p>
            </div>
        </div>

        <div class="chat-footer" id="input-footer-area" style="display:none;">
            <div class="type-area">
                <input type="text" id="chat-input" placeholder="اكتب رسالة...">
            </div>
            <button id="btn-send-message" class="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>

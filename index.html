<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقعي المتكامل</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn-google { background-color: #4285F4; color: white; }
        .btn-google:hover { background-color: #357ae8; }
        .btn-save { background-color: #28a745; color: white; margin-top: 10px; }
        .btn-save:hover { background-color: #218838; }
        .btn-logout { background-color: #dc3545; color: white; margin-top: 20px; }
        .btn-logout:hover { background-color: #c82333; }
        input { width: 90%; padding: 10px; margin: 15px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container" id="auth-container">
    <h2>مرحباً بك في موقعي</h2>
    <p>يرجى تسجيل الدخول للمتابعة</p>
    <button id="btn-google-login" class="btn-google">التسجيل بواسطة Google</button>
</div>

<div class="container" id="app-container" style="display: none;">
    <h2 id="welcome-msg">مرحباً!</h2>
    <p>تم تسجيل دخولك بنجاح وقاعدة البيانات متصلة.</p>
    
    <input type="text" id="user-data" placeholder="اكتب شيئاً لحفظه في قاعدة البيانات">
    <button id="btn-save" class="btn-save">حفظ في قاعدة البيانات</button>
    
    <button id="btn-logout" class="btn-logout">تسجيل الخروج</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // كود الربط الخاص بمشروعك ym-pro-max
  const firebaseConfig = {
    apiKey: "AIzaSyAN11agW-TWwAk3TvF7mRZRt6PHLcnl_aQ",
    authDomain: "ym-pro-max.firebaseapp.com",
    projectId: "ym-pro-max",
    storageBucket: "ym-pro-max.firebasestorage.app",
    messagingSenderId: "174657071953",
    appId: "1:174657071953:web:5e831fc337df46dbd18170"
  };

  // تهيئة الخدمات
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  const authContainer = document.getElementById('auth-container');
  const appContainer = document.getElementById('app-container');
  const welcomeMsg = document.getElementById('welcome-msg');

  // 1. تسجيل الدخول بجوجل
  document.getElementById('btn-google-login').addEventListener('click', () => {
      signInWithPopup(auth, provider)
          .then((result) => {
              alert('أهلاً بك ' + result.user.displayName);
          })
          .catch((error) => {
              alert('خطأ في تسجيل الدخول: ' + error.message);
          });
  });

  // 2. مراقبة حالة المستخدم
  onAuthStateChanged(auth, (user) => {
      if (user) {
          authContainer.style.display = 'none';
          appContainer.style.display = 'block';
          welcomeMsg.innerText = `مرحباً يا ${user.displayName}!`;
      } else {
          authContainer.style.display = 'block';
          appContainer.style.display = 'none';
      }
  });

  // 3. حفظ البيانات في Firestore
  document.getElementById('btn-save').addEventListener('click', async () => {
      const dataText = document.getElementById('user-data').value;
      const user = auth.currentUser;
      if (user) {
          try {
              await setDoc(doc(db, "users", user.uid), {
                  text: dataText,
                  name: user.displayName,
                  email: user.email,
                  lastUpdated: new Date()
              });
              alert('تم حفظ النص في قاعدة البيانات بنجاح!');
          } catch (e) {
              alert('خطأ في الحفظ: ' + e.message);
          }
      }
  });

  // 4. تسجيل الخروج
  document.getElementById('btn-logout').addEventListener('click', () => {
      signOut(auth);
  });
</script>

</body>
</html>

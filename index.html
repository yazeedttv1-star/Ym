<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة لبطتي 🦆✨</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #fff0f5;
            background-image: radial-gradient(#ffb6c1 1px, transparent 1px);
            background-size: 24px 24px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            max-width: 500px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(255, 182, 193, 0.3);
            text-align: center;
            border: 1px solid #ffe4e1;
        }

        h1 {
            color: #d11a5b;
            font-size: 26px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #6b7280;
            font-size: 15px;
            margin-bottom: 30px;
        }

        .interactive-area {
            background: #fffafa;
            border: 2px dashed #ff69b4;
            padding: 30px 20px;
            border-radius: 20px;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
        }

        .display-text {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            line-height: 1.6;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .magic-btn {
            padding: 16px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
        }

        .btn-pink {
            background: #ff69b4;
            box-shadow: 0 4px 12px rgba(255, 105, 180, 0.3);
        }
        .btn-pink:hover { background: #ff1493; transform: scale(1.02); }

        .btn-purple {
            background: #9370db;
            box-shadow: 0 4px 12px rgba(147, 112, 219, 0.3);
        }
        .btn-purple:hover { background: #8a2be2; transform: scale(1.02); }

        /* تأثير القلوب الطائرة */
        .floating-heart {
            position: fixed;
            font-size: 24px;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            z-index: 9999;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 1; }
            100% { transform: translateY(-150px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card">
        <i class="fas fa-gift" style="font-size: 50px; color: #ff69b4; margin-bottom: 15px;"></i>
        <h1>مساحة بطتي الخاصة 🎀</h1>
        <p class="subtitle">اضغطي على الأزرار السحرية بالأسفل لرؤية المفاجآت!</p>

        <div class="interactive-area">
            <p id="display-zone" class="display-text">في انتظار أميرتي لتضغط على الزر الأول ✨</p>
        </div>

        <div class="btn-grid">
            <button id="btn-surprise" class="magic-btn btn-pink">اضغطي هنا للمفاجأة الأولى 💖</button>
            <button id="btn-kiss" class="magic-btn btn-purple">اضغطي هنا لاستلام الهدية الخاصة 💋</button>
        </div>
    </div>

    <script>
        const displayZone = document.getElementById('display-zone');
        const btnSurprise = document.getElementById('btn-surprise');
        const btnKiss = document.getElementById('btn-kiss');

        const sweetMessages = [
            "أنتِ أجمل وأحلى بطة في الكون كله! 🦆💗",
            "ضحكتك بتنور الدنيا واليوم بيبقى أحلى بكتير بسببك ✨",
            "وجودك في حياتي هو أحسن حاجة حصلت دايماً وبدون كلام 😍",
            "كتلة الكسل اللطيفة المفضلة عندي دايماً وأبدأ 👑"
        ];

        btnSurprise.onclick = () => {
            // اختيار رسالة عشوائية لطيفة
            const randomMessage = sweetMessages[Math.floor(Math.random() * sweetMessages.length)];
            displayZone.innerText = randomMessage;
            
            // تشغيل تأثير الاحتفال
            confetti({ particleCount: 60, spread: 60, origin: { y: 0.6 } });
        };

        btnKiss.onclick = (e) => {
            // عرض الرسالة الخاصة بالهدية
            displayZone.innerText = "أرسلت لكِ قبلة طائرة مليئة بالحب والدفء! 💋❤️";
            
            // تشغيل تأثير الاحتفال بالألوان الوردية
            confetti({
                particleCount: 80,
                spread: 80,
                colors: ['#ff69b4', '#ffb6c1', '#ff1493']
            });

            // توليد قلوب متطايرة عند موضع الضغط
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    createHeart(e.clientX || window.innerWidth / 2, e.clientY || window.innerHeight / 2);
                }, i * 100);
            }
        };

        function createHeart(x, y) {
            const heart = document.createElement('i');
            heart.className = 'fas fa-heart floating-heart';
            // توزيع عشوائي طفيف حول مكان الضغط
            heart.style.left = (x + (Math.random() * 40 - 20)) + 'px';
            heart.style.top = (y + (Math.random() * 40 - 20)) + 'px';
            heart.style.color = '#ff1493';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 1000);
        }
    </script>
</body>
</html>

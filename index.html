<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموقع متوقف مؤقتاً</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #111; /* خلفية داكنة لتناسب شريط الأخبار */
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Aref Ruqaa', serif; /* تطبيق خط الرقعة على كامل الصفحة */
        }

        /* شاشة الوسط الرئيسية التوضيحية */
        .center-container {
            text-align: center;
            padding: 20px;
            max-width: 90%;
        }

        .center-container .icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: pulse 2s infinite alternate;
        }

        /* الاسم والجملة في منتصف الشاشة بخط كبير */
        .main-title {
            font-size: 42px;
            color: #f1c40f; /* لون ذهبي مميز للاسم */
            text-shadow: 2px 2px 10px rgba(241, 196, 15, 0.3);
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .sub-title {
            color: #aaa;
            font-size: 22px;
        }

        /* حاوية شريط الأخبار السفلي التلفزيوني */
        .ticker-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(90deg, #b30000 0%, #e60000 100%); /* لون أحمر إخباري عاجل */
            box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            align-items: center;
            height: 65px;
            border-top: 3px solid #f1c40f;
        }

        /* كلمة عاجل الثابتة في الجانب */
        .ticker-title {
            background-color: #f1c40f;
            color: #111;
            padding: 0 25px;
            height: 100%;
            display: flex;
            align-items: center;
            font-weight: bold;
            font-size: 20px;
            z-index: 5;
            box-shadow: 5px 0 10px rgba(0,0,0,0.3);
        }

        /* الحاوية المتحركة للنص */
        .ticker-text-container {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            display: flex;
            align-items: center;
        }

        /* حركة النص المستمرة (شريط الأخبار) */
        .ticker-text {
            display: inline-block;
            padding-right: 100%; 
            font-size: 26px;
            color: #ffffff;
            letter-spacing: 1px;
            animation: marquee 18s linear infinite; /* سرعة مرور شريط الأخبار */
        }

        /* تأثير الأنيميشن لتحريك شريط الأخبار تلفزيونياً */
        @keyframes marquee {
            0% {
                transform: translate3d(100%, 0, 0);
            }
            100% {
                transform: translate3d(-100%, 0, 0);
            }
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.08); }
        }
    </style>
</head>
<body>

    <div class="center-container">
        <div class="icon">⚙️</div>
        <h1 class="main-title">مع تحياتي يزيد أحمد</h1>
        <p class="sub-title">الموقع سوف يشتغل قريباً انتظروني...</p>
    </div>

    <div class="ticker-wrapper">
        <div class="ticker-title">تنويه عاجل</div>
        <div class="ticker-text-container">
            <div class="ticker-text">
                الموقع سوف يشتغل قريباً انتظروني مع تحياتي يزيد أحمد... ✨ الموقع سوف يشتغل قريباً انتظروني مع تحياتي يزيد أحمد... ✨
            </div>
        </div>
    </div>

</body>
</html>

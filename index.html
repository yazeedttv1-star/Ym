<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع يزيد - تسجيل دخول وقاعدة بيانات</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        button { width: 98%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        .btn-secondary { background-color: #28a745; margin-top: 8px; }
        .btn-secondary:hover { background-color: #218838; }
        .btn-danger { background-color: #dc3545; }
        .btn-danger:hover { background-color: #c82333; }
        p { color: #666; font-size: 14px; }
    </style>
</head>
<body>

<div class="container" id="auth-container">
    <h2>مرحباً بك</h2>
    <input type="email" id="email" placeholder="البريد الإلكتروني">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button id="btn-signup">إنشاء حساب جديد</button>
    <button id="btn-login" class="btn-secondary">تسجيل الدخول</button>
</div>

<div class="container" id="app-container" style="display: none;">
    <h2>لوحة التحكم</h2>
    <p id="welcome-msg">أنت مسجل الدخول الآن ✨</p>
    <input type="text" id="user-data" placeholder="اكتب نصاً لحفظه في قاعدة البيانات">
    <button id="btn-save">حفظ في قاعدة البيانات</button>
    <br><br>
    <button id="btn-logout" class="btn-danger">تسجيل الخروج</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // كود الربط الخاص بمشروعك (ym-pro-max)
  const firebaseConfig = {
    apiKey: "AIzaSyAN11agW-TWwAk3TvF7mRZRt6PHLcnl_aQ",
    authDomain: "ym-pro-max.firebaseapp.com",
    projectId: "ym-pro-max",
    storageBucket: "ym-pro-max.firebasestorage.app",
    messagingSenderId: "174657071953",
    appId: "1:174657071953:web:5e831fc337df46dbd18170"
  };

  // تهيئة الخدمات
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const authContainer = document.getElementById('auth-container');
  const appContainer = document.getElementById('app-container');

  // 1. إنشاء حساب جديد
  document.getElementById('btn-signup').addEventListener('click', () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      if(!email || !password) return alert('برجاء ملء البيانات');
      
      createUserWithEmailAndPassword(auth, email, password)
          .then(() => alert('تم إنشاء حسابك بنجاح!'))
          .catch(error => alert('خطأ: ' + error.message));
  });

  // 2. تسجيل الدخول للحساب الحالي
  document.getElementById('btn-login').addEventListener('click', () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      if(!email || !password) return alert('برجاء ملء البيانات');

      signInWithEmailAndPassword(auth, email, password)
          .then(() => alert('تم تسجيل الدخول بنجاح!'))
          .catch(error => alert('خطأ: ' + error.message));
  });

  // 3. التحقق من حالة المستخدم تلقائياً
  onAuthStateChanged(auth, (user) => {
      if (user) {
          authContainer.style.display = 'none';
          appContainer.style.display = 'block';
          document.getElementById('welcome-msg').innerText = `مرحباً: ${user.email}`;
      } else {
          authContainer.style.display = 'block';
          appContainer.style.display = 'none';
      }
  });

  // 4. حفظ البيانات في Firestore باسم المستخدم
  document.getElementById('btn-save').addEventListener('click', async () => {
      const dataText = document.getElementById('user-data').value;
      const user = auth.currentUser;
      if(!dataText) return alert('اكتب شيئاً أولاً');

      if (user) {
          try {
              await setDoc(doc(db, "users", user.uid), {
                  text: dataText,
                  email: user.email,
                  savedAt: new Date()
              });
              alert('تم الحفظ في قاعدة البيانات بنجاح! 🎉');
              document.getElementById('user-data').value = ''; // تفريغ الحقل
          } catch (e) {
              alert('خطأ أثناء الحفظ: ' + e.message);
          }
      }
  });

  // 5. تسجيل الخروج
  document.getElementById('btn-logout').addEventListener('click', () => {
      signOut(auth).then(() => alert('تم تسجيل الخروج'));
  });
</script>

</body>
</html>

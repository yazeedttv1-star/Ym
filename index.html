<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموقع متوقف مؤقتاً</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #111; /* خلفية داكنة لتناسب شريط الأخبار */
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* حاوية شريط الأخبار السفلي التلفزيوني */
        .ticker-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(90deg, #b30000 0%, #e60000 100%); /* لون أحمر إخباري عاجل */
            box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            align-items: center;
            height: 65px;
            border-top: 3px solid #f1c40f; /* خط ذهبي فوق الشريط لمظهر احترافي */
        }

        /* كلمة عاجل أو تنبيه الثابتة في الجانب */
        .ticker-title {
            background-color: #f1c40f;
            color: #111;
            padding: 0 25px;
            height: 100%;
            display: flex;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
            z-index: 5;
            box-shadow: 5px 0 10px rgba(0,0,0,0.3);
        }

        /* الحاوية المتحركة للنص */
        .ticker-text-container {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            display: flex;
            align-items: center;
        }

        /* حركة النص المستمرة (شريط الأخبار) */
        .ticker-text {
            display: inline-block;
            padding-right: 100%; /* يبدأ الحركة بعد انتهاء الشاشة */
            font-family: 'Aref Ruqaa', serif; /* تطبيق خط الرقعة */
            font-size: 26px;
            color: #ffffff;
            letter-spacing: 1px;
            animation: marquee 18s linear infinite; /* سرعة مرور الشريط */
        }

        /* تأثير الأنيميشن لتحريك الشريط من اليسار إلى اليمين (للاتجاه العربي) */
        @keyframes marquee {
            0% {
                transform: translate3d(100%, 0, 0);
            }
            100% {
                transform: translate3d(-100%, 0, 0);
            }
        }

        /* شاشة الوسط التوضيحية */
        .center-message {
            text-align: center;
            opacity: 0.8;
        }

        .center-message .icon {
            font-size: 70px;
            margin-bottom: 15px;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <div class="center-message">
        <div class="icon">⚙️</div>
        <h2 style="color: #aaa; font-size: 20px;">تحديثات وتقنيات جارية...</h2>
    </div>

    <div class="ticker-wrapper">
        <div class="ticker-title">تنويه</div>
        <div class="ticker-text-container">
            <div class="ticker-text">
                الموقع سوف يشتغل قريباً انتظروني مع تحياتي يزيد أحمد... ✨ الموقع سوف يشتغل قريباً انتظروني مع تحياتي يزيد أحمد... ✨
            </div>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واتساب ويب - دردشة آمنة وخاصة 🔒</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b141a; color: #e9edef; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* شاشات الدخول والإعدادات */
        .auth-card { background: #111b21; max-width: 400px; width: 100%; padding: 40px 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); text-align: center; border: 1px solid #222e35; }
        .auth-card h1 { color: #00a884; font-size: 24px; margin-bottom: 15px; }
        .auth-card p { color: #8696a0; font-size: 14px; margin-bottom: 30px; }
        .login-btn { padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; transition: 0.2s; margin-bottom: 15px; }
        .btn-google { background: white; color: #3b3b3b; }
        .btn-facebook { background: #1877f2; color: white; }

        .input-room { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #2a3942; background: #202c33; color: white; margin-bottom: 20px; text-align: center; font-size: 16px; outline: none; }
        .input-room:focus { border-color: #00a884; }

        /* واجهة الواتساب */
        .whatsapp-container { width: 100%; height: 100vh; display: flex; flex-direction: column; background-color: #0b141a; }
        .chat-header { background: #202c33; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #2a3942; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-info i { font-size: 24px; color: #8696a0; }
        
        .chat-main { flex-grow: 1; overflow-y: auto; padding: 20px 5%; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: #0b141a; opacity: 0.95; }
        
        .message { padding: 8px 12px; border-radius: 8px; max-width: 65%; width: fit-content; font-size: 15px; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); display: flex; flex-direction: column; }
        .message.received { background-color: #202c33; align-self: flex-start; border-top-left-radius: 0; }
        .message.received .sender-name { color: #00a884; font-size: 12px; font-weight: bold; margin-bottom: 4px; }
        .message.sent { background-color: #005c4b; align-self: flex-end; border-top-right-radius: 0; }
        .message-text { color: #e9edef; word-break: break-word; line-height: 1.4; }

        .chat-footer { background: #202c33; padding: 10px 20px; display: flex; align-items: center; gap: 15px; }
        .input-wrapper { flex-grow: 1; }
        .chat-footer input { width: 100%; padding: 12px 18px; border-radius: 8px; border: none; background: #2a3942; color: #e9edef; outline: none; font-size: 15px; }
        .send-btn { background: none; border: none; color: #8696a0; cursor: pointer; font-size: 22px; }
        .send-btn:hover { color: #00a884; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="screen-auth" class="auth-card">
        <h1>بوابة الخصوصية الآمنة 🔐</h1>
        <p>سجل دخولك أولاً لبدء تشفير المحادثات.</p>
        <button id="btn-google" class="login-btn btn-google"><i class="fab fa-google" style="color: #ea4335;"></i> الدخول عبر Google</button>
        <button id="btn-facebook" class="login-btn btn-facebook"><i class="fab fa-facebook"></i> الدخول عبر Facebook</button>
    </div>

    <div id="screen-room" class="auth-card hidden">
        <h1>إنشاء غرفة خاصة مشفرة 🔒</h1>
        <p>اكتب اسم الغرفة أو الكود السري المشترك بينك وبين الطرف الآخر لدخول الشات الخاص.</p>
        <input type="text" id="room-id-input" class="input-room" placeholder="مثال: s_room_99">
        <button id="btn-enter-room" class="login-btn" style="background: #00a884; color: white;">دخول الغرفة الآمنة 🚀</button>
    </div>

    <div id="screen-chat" class="whatsapp-container hidden">
        <div class="chat-header">
            <div class="user-info">
                <i class="fas fa-lock" style="color: #00a884;"></i>
                <div>
                    <span>غرفة مشفرة: <span id="current-room-display" style="color: #38bdf8;"></span></span>
                    <p style="font-size: 12px; color: #8696a0;">متصل كـ: <span id="user-name" style="color: #00a884;"></span></p>
                </div>
            </div>
        </div>

        <div class="chat-main" id="chat-main"></div>

        <div class="chat-footer">
            <div class="input-wrapper">
                <input type="text" id="chat-input" placeholder="اكتب رسالة مشفرة...">
            </div>
            <button id="btn-send" class="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, FacebookAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAN11agW-TWwAk3TvF7mRZRt6PHLcnl_aQ",
          authDomain: "ym-pro-max.firebaseapp.com",
          projectId: "ym-pro-max",
          storageBucket: "ym-pro-max.firebasestorage.app",
          messagingSenderId: "174657071953",
          appId: "1:174657071953:web:5e831fc337df46dbd18170"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const sAuth = document.getElementById('screen-auth');
        const sRoom = document.getElementById('screen-room');
        const sChat = document.getElementById('screen-chat');
        const userNameDisplay = document.getElementById('user-name');
        const currentRoomDisplay = document.getElementById('current-room-display');
        const chatMain = document.getElementById('chat-main');
        const chatInput = document.getElementById('chat-input');
        const roomIdInput = document.getElementById('room-id-input');

        let currentUserName = "";
        let selectedRoomId = "";
        let unsubscribeChat = null;

        document.getElementById('btn-google').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
        document.getElementById('btn-facebook').onclick = () => signInWithPopup(auth, new FacebookAuthProvider());

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserName = user.displayName || "مستخدم واتساب";
                userNameDisplay.innerText = currentUserName;
                sAuth.classList.add('hidden');
                sRoom.classList.remove('hidden'); // توجيه المستخدم لصفحة اختيار الغرفة أولاً
            }
        });

        // عند الضغط على دخول الغرفة
        document.getElementById('btn-enter-room').onclick = () => {
            const roomVal = roomIdInput.value.trim();
            if (roomVal !== "") {
                selectedRoomId = roomVal;
                currentRoomDisplay.innerText = selectedRoomId;
                sRoom.classList.add('hidden');
                sChat.classList.remove('hidden');
                startLiveChat();
            } else {
                alert("الرجاء إدخال اسم أو كود الغرفة أولاً!");
            }
        };

        // دالة بدء جلب الرسائل الخاصة بالغرفة المحددة فقط بشكل آمن
        function startLiveChat() {
            // جلب المستندات التي تنتمي فقط للـ roomId المختار وترتيبها تصاعدياً
            const q = query(
                collection(db, "private_chats"), 
                where("roomId", "==", selectedRoomId),
                orderBy("timestamp", "asc")
            );

            unsubscribeChat = onSnapshot(q, (snapshot) => {
                chatMain.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const messageElement = document.createElement('div');
                    messageElement.classList.add('message');

                    if (data.sender === currentUserName) {
                        messageElement.classList.add('sent');
                        messageElement.innerHTML = `<span class="message-text">${data.text}</span>`;
                    } else {
                        messageElement.classList.add('received');
                        messageElement.innerHTML = `
                            <span class="sender-name">${data.sender}</span>
                            <span class="message-text">${data.text}</span>
                        `;
                    }
                    chatMain.appendChild(messageElement);
                });
                chatMain.scrollTop = chatMain.scrollHeight;
            });
        }

        document.getElementById('btn-send').onclick = sendPrivateMessage;
        chatInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendPrivateMessage(); });

        async function sendPrivateMessage() {
            const text = chatInput.value.trim();
            if (text !== "" && selectedRoomId !== "") {
                try {
                    await addDoc(collection(db, "private_chats"), {
                        roomId: selectedRoomId, // حفظ معرف الغرفة لمنع الآخرين من رؤيتها
                        sender: currentUserName,
                        text: text,
                        timestamp: new Date()
                    });
                    chatInput.value = "";
                } catch (e) {
                    alert("خطأ في الإرسال: تأكد من تفعيل الكوليكشن وإعدادات القواعد في السيرفر.");
                }
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غرفة الدردشة العامة 🌐✨</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .card { background: #1e293b; max-width: 600px; width: 100%; padding: 30px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 1px solid #334155; display: flex; flex-direction: column; }
        h1 { color: #38bdf8; font-size: 24px; margin-bottom: 10px; text-align: center; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 25px; text-align: center; }
        .hidden { display: none !important; }
        
        /* أزرار تسجيل الدخول */
        .auth-btns { display: flex; flex-direction: column; gap: 15px; }
        .login-btn { padding: 14px; border-radius: 12px; font-size: 16px; font-weight: bold; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; transition: all 0.2s; }
        .btn-google { background: white; color: #334155; }
        .btn-google:hover { background: #f1f5f9; }
        .btn-facebook { background: #1877f2; color: white; }
        .btn-facebook:hover { background: #166fe5; }

        /* شاشة الشات العام */
        .chat-container { display: flex; flex-direction: column; height: 450px; }
        .chat-box { flex-grow: 1; background: #0f172a; border-radius: 12px; padding: 15px; overflow-y: auto; margin-bottom: 15px; border: 1px solid #334155; display: flex; flex-direction: column; gap: 12px; }
        .msg { background: #334155; padding: 10px 14px; border-radius: 12px; width: fit-content; max-width: 85%; display: flex; flex-direction: column; }
        .msg-sender { font-size: 12px; font-weight: bold; color: #38bdf8; margin-bottom: 4px; }
        .msg.me { background: #0ea5e9; align-self: flex-start; color: #0f172a; }
        .msg.me .msg-sender { color: #1e293b; }
        .msg-text { font-size: 15px; word-break: break-word; }
        
        .input-group { display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 14px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; outline: none; font-size: 15px; }
        input:focus { border-color: #38bdf8; }
        .send-btn { background: #38bdf8; color: #0f172a; padding: 0 24px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        .send-btn:hover { background: #0ea5e9; }
    </style>
</head>
<body>

    <div id="screen-auth" class="card" style="max-width: 420px;">
        <h1>غرفة الشات الجماعي 🌐</h1>
        <p>سجل دخولك الآن للبدء في الدردشة الحية والمباشرة مع الجميع.</p>
        <div class="auth-btns">
            <button id="btn-google" class="login-btn btn-google"><i class="fab fa-google" style="color: #ea4335;"></i> الدخول عبر Google</button>
            <button id="btn-facebook" class="login-btn btn-facebook"><i class="fab fa-facebook"></i> الدخول عبر Facebook</button>
        </div>
    </div>

    <div id="screen-chat" class="card hidden">
        <h1>الدردشة العامة المباشرة 💬</h1>
        <p>أنت متصل الآن كـ: <span id="user-display-name" style="color: #fff; font-weight: bold;"></span></p>
        
        <div class="chat-container">
            <div class="chat-box" id="chat-box"></div>
            <div class="input-group">
                <input type="text" id="chat-input" placeholder="اكتب رسالتك للجميع هنا...">
                <button id="btn-send" class="send-btn">إرسال 🚀</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, FacebookAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // إعدادات الـ Firebase الحقيقية الخاصة بك
        const firebaseConfig = {
          apiKey: "AIzaSyAN11agW-TWwAk3TvF7mRZRt6PHLcnl_aQ",
          authDomain: "ym-pro-max.firebaseapp.com",
          projectId: "ym-pro-max",
          storageBucket: "ym-pro-max.firebasestorage.app",
          messagingSenderId: "174657071953",
          appId: "1:174657071953:web:5e831fc337df46dbd18170",
          databaseURL: "https://ym-pro-max-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const sAuth = document.getElementById('screen-auth');
        const sChat = document.getElementById('screen-chat');
        const userDisplayName = document.getElementById('user-display-name');
        const chatBox = document.getElementById('chat-box');
        const chatInput = document.getElementById('chat-input');

        let currentName = "";

        // تسجيل الدخول بجوجل
        document.getElementById('btn-google').onclick = () => {
            signInWithPopup(auth, new GoogleAuthProvider()).catch(err => alert("خطأ جوجل: " + err.message));
        };

        // تسجيل الدخول بفيسبوك
        document.getElementById('btn-facebook').onclick = () => {
            signInWithPopup(auth, new FacebookAuthProvider()).catch(err => alert("خطأ فيسبوك: " + err.message));
        };

        // مراقبة حالة تسجيل الدخول والاتصال بالشات العام
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentName = user.displayName || "مستخدم مجهول";
                userDisplayName.innerText = currentName;
                sAuth.classList.add('hidden');
                sChat.classList.remove('hidden');

                // جلب الرسائل العامة وحفظ تحديثاتها لايف لكل المستخدمين
                onValue(ref(db, 'public_chat'), (snapshot) => {
                    chatBox.innerHTML = "";
                    snapshot.forEach((childSnapshot) => {
                        const data = childSnapshot.val();
                        const msgDiv = document.createElement('div');
                        msgDiv.classList.add('msg');
                        
                        // تمييز رسائلي بلون مختلف عن بقية الأعضاء
                        if (data.sender === currentName) msgDiv.classList.add('me');
                        
                        msgDiv.innerHTML = `
                            <span class="msg-sender">${data.sender}</span>
                            <span class="msg-text">${data.text}</span>
                        `;
                        chatBox.appendChild(msgDiv);
                    });
                    chatBox.scrollTop = chatBox.scrollHeight; // التمرير التلقائي لآخر رسالة
                });
            }
        });

        // تنفيذ إرسال الرسالة للجميع
        document.getElementById('btn-send').onclick = sendPublicMessage;
        chatInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendPublicMessage(); });

        function sendPublicMessage() {
            const text = chatInput.value.trim();
            if (text !== "") {
                const globalChatRef = ref(db, 'public_chat');
                const newMsgRef = push(globalChatRef); // إنشاء معرف فريد للرسالة
                set(newMsgRef, {
                    sender: currentName,
                    text: text,
                    timestamp: new Date().toISOString()
                });
                chatInput.value = "";
            }
        }
    </script>
</body>
</html>
